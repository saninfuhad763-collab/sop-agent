<!DOCTYPE html>
<html>
<head>
  <title>OpsMind AI</title>

  <style>
body {
  font-family: Arial;
  background: #f0f2f5;
}

.container {
  max-width: 700px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}

#chat {
  height: 400px;
  overflow-y: auto;
  margin-top: 20px;
  border: 1px solid #ddd;
  padding: 10px;
}

.message {
  margin: 10px 0;
  padding: 10px;
  border-radius: 10px;
  max-width: 70%;
}

.user {
  background: #007bff;
  color: white;
  margin-left: auto;
}

.bot {
  background: #e4e6eb;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

button {
  padding: 10px;
  margin-top: 10px;
  width: 100%;
  cursor: pointer;
}

button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.error {
  background: #ffe5e5;
  color: #7a1f1f;
}

@media (max-width: 520px) {
  .container {
    margin: 10px;
    padding: 16px;
  }

  #chat {
    height: 320px;
  }
}
</style>
</head>

<body>

<div class="container">
  <h2>📄 OpsMind AI</h2>

  <input type="file" id="fileInput">
  <button id="uploadButton" type="button" onclick="uploadFile()">Upload PDF</button>
  <button id="resetButton" type="button" onclick="resetSession()">Reset</button>

  <input type="text" id="question" placeholder="Ask a question...">
  <button id="askButton" type="button" onclick="askQuestion()">Ask</button>

  <div id="chat"></div>
</div>

<script>
const API_BASE = "http://localhost:5000";

const uploadButton = document.getElementById("uploadButton");
const askButton = document.getElementById("askButton");
const resetButton = document.getElementById("resetButton");

function setControls(enabled) {
  uploadButton.disabled = !enabled;
  askButton.disabled = !enabled;
  resetButton.disabled = !enabled;
}

async function uploadFile() {
  const file = document.getElementById("fileInput").files[0];

  if (!file || !file.name.toLowerCase().endsWith(".pdf")) {
    alert("Please select a PDF file.");
    return;
  }

  setControls(false);
  const botId = addMessage("bot", "⏳ Processing PDF...");
  const botDiv = document.getElementById(botId);

  const formData = new FormData();
  formData.append("file", file);

  try {
    const res = await fetch(`${API_BASE}/upload`, {
      method: "POST",
      body: formData,
    });

    const data = await res.json();

    if (!res.ok || data.error) {
      botDiv.innerText = "❌ " + (data.error || "Upload failed.");
      return;
    }

    botDiv.innerText = "✅ PDF ready. Ask questions now.";
  } catch (err) {
    botDiv.innerText = "❌ Upload failed";
  } finally {
    setControls(true);
  }
}

async function askQuestion() {
  const input = document.getElementById("question");
  const question = input.value.trim();

  if (!question) return;

  addMessage("user", question);
  input.value = "";

  setControls(false);
  const botId = addMessage("bot", "⏳ Thinking...");
  const botDiv = document.getElementById(botId);

  try {
    const response = await fetch(`${API_BASE}/ask`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({ question }),
    });

    if (!response.ok) {
      const errorData = await response.json().catch(() => ({ error: response.statusText }));
      botDiv.innerText = "❌ " + (errorData.error || "Request failed.");
      return;
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();

    let fullText = "";
    botDiv.innerText = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value);
      fullText += chunk;
      botDiv.innerText = fullText;

      const chat = document.getElementById("chat");
      chat.scrollTop = chat.scrollHeight;
    }
  } catch (err) {
    botDiv.innerText = "❌ Server error";
  } finally {
    setControls(true);
  }
}

async function resetSession() {
  setControls(false);
  const botId = addMessage("bot", "⏳ Resetting session...");
  const botDiv = document.getElementById(botId);

  try {
    const res = await fetch(`${API_BASE}/reset`, {
      method: "POST",
    });

    const data = await res.json();
    if (!res.ok || data.error) {
      botDiv.innerText = "❌ " + (data.error || "Reset failed.");
      return;
    }

    botDiv.innerText = "✅ Session reset. Upload a new PDF.";
  } catch (err) {
    botDiv.innerText = "❌ Reset failed";
  } finally {
    setControls(true);
  }
}

function addMessage(type, text) {
  const chat = document.getElementById("chat");

  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerText = text;

  const id = Date.now();
  div.id = id;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;

  return id;
}

</script>

</body>
</html>
