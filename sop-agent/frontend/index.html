<!DOCTYPE html>
<html>
<head>
  <title>OpsMind AI</title>

  <style>
    body {
      background: linear-gradient(135deg, #1f1c2c, #928dab);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 750px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      color: white;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input, button {
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin: 5px;
    }

    button {
      cursor: pointer;
      font-weight: bold;
    }

    #chat {
      margin-top: 20px;
      max-height: 350px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .message {
      max-width: 70%;
      padding: 10px;
      margin: 8px;
      border-radius: 10px;
      word-wrap: break-word;
      font-size: 14px;
    }

    .user {
      background: #4da3ff;
      color: white;
      align-self: flex-end;
      text-align: right;
    }

    .bot {
      background: #4cd964;
      color: black;
      align-self: flex-start;
      text-align: left;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>📄 OpsMind AI</h2>

  <input type="file" id="fileInput">
  <button onclick="uploadFile()">Upload PDF</button>
  <button onclick="resetSession()">Reset</button>

  <br>

  <input type="text" id="question" placeholder="Ask a question...">
  <button onclick="askQuestion()">Ask</button>

  <div id="chat"></div>
</div>

<script>
const API_BASE = "http://localhost:5000";

let loadingDiv = null;

// ✅ MESSAGE FUNCTION
function addMessage(text, sender) {
  const chat = document.getElementById("chat");

  const div = document.createElement("div");
  div.className = "message " + (sender === "user" ? "user" : "bot");

  div.innerHTML = text.replace(/\n/g, "<br>");

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;

  return div;
}

// ⏳ LOADING
function showLoading() {
  loadingDiv = addMessage("⏳ Thinking...", "bot");
}

function removeLoading() {
  if (loadingDiv) loadingDiv.remove();
}

// 📄 UPLOAD
async function uploadFile() {
  const file = document.getElementById("fileInput").files[0];

  if (!file || !file.name.toLowerCase().endsWith(".pdf")) {
    alert("Please select a PDF file.");
    return;
  }

  const msg = addMessage("⏳ Processing PDF...", "bot");

  const formData = new FormData();
  formData.append("file", file);

  try {
    const res = await fetch(`${API_BASE}/upload`, {
      method: "POST",
      body: formData,
    });

    const data = await res.json();

    msg.innerText = res.ok ? "✅ PDF ready. Ask questions now." : "❌ Upload failed";
  } catch {
    msg.innerText = "❌ Upload failed";
  }
}

// ❓ ASK (UPDATED STREAMING FIX)
async function askQuestion() {
  const input = document.getElementById("question");
  const question = input.value.trim();

  if (!question) return;

  addMessage(question, "user");
  input.value = "";

  showLoading();

  try {
    const response = await fetch(`${API_BASE}/ask`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question }),
    });

    const reader = response.body.getReader();
    const decoder = new TextDecoder();

    let fullText = "";
    const botDiv = addMessage("", "bot");

    let firstChunk = true;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      if (firstChunk) {
        removeLoading(); // ✅ FIXED HERE
        firstChunk = false;
      }

      const chunk = decoder.decode(value);
      fullText += chunk;

      botDiv.innerHTML = fullText.replace(/\n/g, "<br>");
    }

  } catch {
    removeLoading();
    addMessage("❌ Server error", "bot");
  }
}

// 🔁 RESET
async function resetSession() {
  addMessage("⏳ Resetting...", "bot");

  await fetch(`${API_BASE}/reset`, { method: "POST" });

  addMessage("✅ Session reset", "bot");
}
</script>

</body>
</html>
