<!DOCTYPE html>
<html>
<head>
  <title>OpsMind AI</title>

  <style>
    body {
      background: linear-gradient(135deg, #1f1c2c, #928dab);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

      .container {
      width: 100%;
      max-width: 750px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      color: white;
    }


    h2 {
      text-align: center;
      margin-bottom: 20px;
      font-weight: 600;
    }

    input[type="file"] {
      background: rgba(255,255,255,0.2);
      border: none;
      padding: 10px;
      border-radius: 8px;
      color: white;
    }

    input[type="text"] {
      padding: 12px;
      border-radius: 8px;
      border: none;
      outline: none;
      margin-top: 10px;
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 8px;
      margin-top: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    button:nth-of-type(1) {
      background: #00c6ff;
      color: black;
    }

    button:nth-of-type(2) {
      background: #7bed9f;
      color: black;
    }

    #chat {
      margin-top: 20px;
      max-height: 350px;
      overflow-y: auto;
      padding-right: 5px;
    }

    .message {
      margin-bottom: 12px;
      padding: 12px;
      border-radius: 12px;
      max-width: 80%;
      word-wrap: break-word;
      font-size: 14px;
      line-height: 1.4;
    }

    .user {
      background: #4facfe;
      color: white;
      margin-left: auto;
      text-align: right;
    }

    .bot {
      background: #43e97b;
      color: black;
      margin-right: auto;
    }

    .error {
      background: #ff6b6b;
      color: white;
      text-align: center;
    }

    small {
      opacity: 0.7;
      display: block;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>📄 OpsMind AI</h2>

  <input type="file" id="fileInput">
  <button id="uploadButton" type="button" onclick="uploadFile()">Upload PDF</button>
  <button id="resetButton" type="button" onclick="resetSession()">Reset</button>

  <input type="text" id="question" placeholder="Ask a question...">
  <button id="askButton" type="button" onclick="askQuestion()">Ask</button>

  <div id="chat"></div>
</div>

<script>
const API_BASE = "http://localhost:5000";

const uploadButton = document.getElementById("uploadButton");
const askButton = document.getElementById("askButton");
const resetButton = document.getElementById("resetButton");

function setControls(enabled) {
  uploadButton.disabled = !enabled;
  askButton.disabled = !enabled;
  resetButton.disabled = !enabled;
}

async function uploadFile() {
  const file = document.getElementById("fileInput").files[0];

  if (!file || !file.name.toLowerCase().endsWith(".pdf")) {
    alert("Please select a PDF file.");
    return;
  }

  setControls(false);
  const botId = addMessage("bot", "⏳ Processing PDF...");
  const botDiv = document.getElementById(botId);

  const formData = new FormData();
  formData.append("file", file);

  try {
    const res = await fetch(`${API_BASE}/upload`, {
      method: "POST",
      body: formData,
    });

    const data = await res.json();

    if (!res.ok || data.error) {
      botDiv.innerText = "❌ " + (data.error || "Upload failed.");
      return;
    }

    botDiv.innerText = "✅ PDF ready. Ask questions now.";
  } catch (err) {
    botDiv.innerText = "❌ Upload failed";
  } finally {
    setControls(true);
  }
}

async function askQuestion() {
  const input = document.getElementById("question");
  const question = input.value.trim();

  if (!question) return;

  addMessage("user", question);
  input.value = "";

  setControls(false);
  const botId = addMessage("bot", "⏳ Thinking...");
  const botDiv = document.getElementById(botId);

  try {
    const response = await fetch(`${API_BASE}/ask`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({ question }),
    });

    if (!response.ok) {
      const errorData = await response.json().catch(() => ({ error: response.statusText }));
      botDiv.innerText = "❌ " + (errorData.error || "Request failed.");
      return;
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();

    let fullText = "";
    botDiv.innerText = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value);
      fullText += chunk;
      botDiv.innerText = fullText;

      const chat = document.getElementById("chat");
      chat.scrollTop = chat.scrollHeight;
    }
  } catch (err) {
    botDiv.innerText = "❌ Server error";
  } finally {
    setControls(true);
  }
}

async function resetSession() {
  setControls(false);
  const botId = addMessage("bot", "⏳ Resetting session...");
  const botDiv = document.getElementById(botId);

  try {
    const res = await fetch(`${API_BASE}/reset`, {
      method: "POST",
    });

    const data = await res.json();
    if (!res.ok || data.error) {
      botDiv.innerText = "❌ " + (data.error || "Reset failed.");
      return;
    }

    botDiv.innerText = "✅ Session reset. Upload a new PDF.";
  } catch (err) {
    botDiv.innerText = "❌ Reset failed";
  } finally {
    setControls(true);
  }
}

function addMessage(type, text) {
  const chat = document.getElementById("chat");

  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerText = text;

  const id = Date.now();
  div.id = id;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;

  return id;
}

</script>

</body>
</html>
