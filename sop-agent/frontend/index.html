<!DOCTYPE html>
<html>
<head>
  <title>OpsMind AI</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 20px;
    }

    .container {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    input, button {
      padding: 10px;
      margin-top: 10px;
      width: 100%;
    }

    #chat {
      margin-top: 20px;
      max-height: 400px;
      overflow-y: auto;
    }

    .message {
      margin-bottom: 15px;
      padding: 10px;
      border-radius: 8px;
    }

    .user { background: #d1e7ff; }
    .bot { background: #e2ffe2; }
    .error { background: #ffe2e2; color: red; }
  </style>
</head>

<body>

<div class="container">
  <h2>📄 OpsMind AI</h2>

  <input type="file" id="fileInput">
  <button onclick="uploadFile()">Upload PDF</button>

  <input type="text" id="question" placeholder="Ask a question...">
  <button onclick="askQuestion()">Ask</button>

  <div id="chat"></div>
</div>

<script>

async function uploadFile() {
  const file = document.getElementById("fileInput").files[0];

  if (!file) {
    alert("Select a file first");
    return;
  }

  addMessage("bot", "⏳ Processing PDF...");

  const formData = new FormData();
  formData.append("file", file);

  const res = await fetch("http://localhost:5000/upload", {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  if (data.error) {
    addMessage("error", data.error);
    return;
  }

  addMessage("bot", "✅ PDF ready. Ask questions now.");
}

async function askQuestion() {
  const input = document.getElementById("question");
  const question = input.value;

  if (!question) return;

  addMessage("user", question);
  input.value = "";

  const loadingId = addMessage("bot", "⏳ Thinking...");

  try {
    const res = await fetch("http://localhost:5000/ask", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ question })
    });

    const data = await res.json();

    removeMessage(loadingId);

    if (data.error) {
      addMessage("error", data.error);
      return;
    }

    addMessage(
      "bot",
      data.answer +
      "<br><small>Sources: " + data.sources.join(", ") + "</small>"
    );

  } catch (err) {
    removeMessage(loadingId);
    addMessage("error", "Server error");
  }
}

function addMessage(type, text) {
  const chat = document.getElementById("chat");

  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerHTML = text;

  const id = Date.now();
  div.id = id;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;

  return id;
}

function removeMessage(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

</script>

</body>
</html>
